name: 🏎️ ML Service Load Test

on:
  schedule:
    - cron: '0 2 * * *' # Every day at 2:00 AM UTC
  workflow_dispatch:

jobs:
  load-test:
    name: 🏋️ Run Locust Load Tests
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install Locust
        run: pip install locust

      - name: 🐳 Start ML Service
        run: docker compose up -d ml

      - name: ⏳ Wait for ML Service
        run: |
          echo "Waiting for ML service to be healthy..."
          timeout 60 bash -c 'until curl -f http://localhost:8000/docs >/dev/null 2>&1; do sleep 2; done' || (docker compose logs ml && exit 1)

      - name: 🚀 Run Locust Load Tests
        run: locust -f apps/ml/tests/locustfile.py --headless -u 10 -r 2 -t 1m --host=http://localhost:8000

      - name: 🛑 Stop ML Service
        if: always()
        run: docker compose down
